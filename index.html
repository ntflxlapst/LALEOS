    <script>
        // Gérer le redimensionnement pour que la vidéo couvre tout l'écran
        function resizeVideo() {
            const video = document.getElementById('video-player');
            if (video) {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // Calculer les dimensions pour couvrir tout l'écran
                const videoAspectRatio = 16 / 9;
                const windowAspectRatio = windowWidth / windowHeight;
                
                if (windowAspectRatio > videoAspectRatio) {
                    video.style.width = windowWidth + 'px';
                    video.style.height = (windowWidth / videoAspectRatio) + 'px';
                    video.style.left = '0px';
                    video.style.top = ((windowHeight - (windowWidth / videoAspectRatio)) / 2) + 'px';
                } else {
                    video.style.width = (windowHeight * videoAspectRatio) + 'px';
                    video.style.height = windowHeight + 'px';
                    video.style.left = ((windowWidth - (windowHeight * videoAspectRatio)) / 2) + 'px';
                    video.style.top = '0px';
                }
            }
        }

        // Démarrer la vidéo automatiquement au chargement
        window.addEventListener('load', function() {
            const video = document.getElementById('video-player');
            
            // Démarrer la vidéo avec son
            if (video) {
                video.volume = 0.3;
                video.muted = false;
                
                // Essayer de jouer la vidéo
                video.play().then(function() {
                    console.log('Video playing successfully');
                }).catch(function(error) {
                    console.log('Auto-play prevented, trying muted first:', error);
                    // Si auto-play bloqué, démarrer muette puis activer le son
                    video.muted = true;
                    video.play().then(function() {
                        setTimeout(function() {
                            video.muted = false;
                            video.volume = 0.3;
                        }, 1000);
                    });
                });
            }
            
            resizeVideo();
        });

        window.addEventListener('resize', resizeVideo);
    </script>
